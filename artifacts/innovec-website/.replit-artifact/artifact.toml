kind = "web"
previewPath = "/"
title = "INNOVEC Website"
version = "1.0.0"
id = "artifacts/innovec-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22427

[services.development]
run = "pnpm --filter @workspace/innovec-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/innovec-website", "run", "build" ]
publicDir = "artifacts/innovec-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22427"
BASE_PATH = "/"
